<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=4" />
    <link rel="apple-touch-icon" href="/favicon.svg?v=4" />
    <meta name="apple-mobile-web-app-title" content="PetFlik" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#56AB46" />
    
    <!-- Permissions Policy for Geolocation -->
    <meta http-equiv="Permissions-Policy" content="geolocation=(self), camera=(self &quot;https://verify.didit.me&quot;), microphone=(self &quot;https://verify.didit.me&quot;)" />
    
    <!-- Content Security Policy - Allow Stripe and Payment Methods -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval' https://js.stripe.com https://maps.googleapis.com https://pay.google.com https://*.gstatic.com https://static.cloudflareinsights.com;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://pay.google.com;
      font-src 'self' https://fonts.gstatic.com data:;
      img-src 'self' data: https: blob:;
      connect-src 'self' https://*.supabase.co https://api.stripe.com https://*.stripe.com https://maps.googleapis.com https://pay.google.com wss://*.supabase.co https://*.didit.me;
      frame-src 'self' https://js.stripe.com https://hooks.stripe.com https://pay.google.com https://verify.didit.me https://*.didit.me;
      object-src 'none';
      base-uri 'self';
    " />
    
    <title>Petflik - Trusted Pet Sitters & Dog Walkers</title>
    <link rel="canonical" href="https://petflik.com/" />
    
    <!-- PetFlik Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <!-- Material Symbols Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Petflik is Europe's trusted marketplace for pet care. Connect with verified dog walkers and pet sitters near you. Secure, reliable care for your dogs and cats." />
    <meta name="keywords" content="petflik, pet sitting, dog walking, dog sitter, cat sitter, pet care Europe, professional pet sitters, dog walker near me" />
    <meta name="author" content="Petflik" />
    <meta name="robots" content="index, follow" />
    
    <!-- Cache Control -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://petflik.com/" />
    <meta property="og:title" content="Petflik - Trusted Pet Sitters & Dog Walkers" />
    <meta property="og:description" content="Connect with trusted, professional pet sitters for dogs and cats in your area. Find the perfect caregiver for your furry friends." />
    <meta property="og:image" content="https://petflik.com/app-logo.png" />
    <meta property="og:site_name" content="Petflik" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://petflik.com/" />
    <meta name="twitter:title" content="Petflik - Trusted Pet Sitters & Dog Walkers" />
    <meta name="twitter:description" content="Connect with trusted, professional pet sitters for dogs and cats in your area." />
    <meta name="twitter:image" content="https://petflik.com/app-logo.png" />
    
    <!-- Structured Data for Brand Identity -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Petflik",
      "url": "https://petflik.com",
      "logo": "https://petflik.com/app-logo.png",
      "sameAs": [
        "https://www.instagram.com/petflik",
        "https://www.facebook.com/petflik"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "info@petflik.com",
        "contactType": "customer service"
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Petflik",
      "url": "https://petflik.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://petflik.com/home?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
